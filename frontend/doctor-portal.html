<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>C-SSRS 电子评估系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, "Microsoft YaHei", sans-serif; background: #f5f7fa; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: #fff; border-radius: 12px; padding: 40px; text-align: center; box-shadow: 0 2px 12px rgba(0,0,0,0.08); max-width: 400px; }
        h1 { font-size: 20px; color: #1a1a1a; margin-bottom: 12px; }
        p { color: #666; font-size: 14px; margin-bottom: 20px; }
        .spinner { width: 32px; height: 32px; border: 3px solid #e0e0e0; border-top-color: #1890ff; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .btn { display: inline-block; background: #1890ff; color: #fff; padding: 12px 32px; border-radius: 6px; text-decoration: none; font-size: 15px; }
        .btn:hover { background: #096dd9; }
    </style>
</head>
<body>
    <div class="card">
        <h1>C-SSRS 电子评估系统</h1>
        <p>正在跳转到医生端，请稍候…</p>
        <div class="spinner"></div>
        <a class="btn" id="enter-btn" href="/">手动进入</a>
    </div>
<script>
    // Dynamically redirect to avoid hardcoded server address
    var target = window.location.origin + '/';
    document.getElementById('enter-btn').href = target;
    window.location.href = target;
</script>
</body>
</html>
