<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>C-SSRS 电子评估系统</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro SC", "PingFang SC", "Microsoft YaHei", sans-serif;
            background-color: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            color: #1e293b;
        }
        .container {
            width: 100%;
            max-width: 400px;
        }
        .header {
            text-align: center;
            margin-bottom: 32px;
            padding: 0 8px;
        }
        .logo {
            font-size: 32px;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }
        .subtitle {
            font-size: 15px;
            color: #64748b;
            line-height: 1.5;
        }
        .cards-wrapper {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .card {
            display: block;
            text-decoration: none;
            background: #ffffff;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            border: 2px solid transparent;
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
            cursor: pointer;
        }
        .card:active {
            transform: scale(0.98);
        }
        .card.doctor {
            border-color: #dbeafe;
        }
        .card.doctor:active {
            border-color: #2563eb;
            background: #eff6ff;
        }
        .card.admin {
            border-color: #f3e8ff;
        }
        .card.admin:active {
            border-color: #7c3aed;
            background: #faf5ff;
        }
        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        .card-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        .card.doctor .card-icon {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
        }
        .card.admin .card-icon {
            background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%);
        }
        .card-title {
            font-size: 18px;
            font-weight: 600;
            color: #0f172a;
        }
        .card-desc {
            font-size: 14px;
            color: #64748b;
            line-height: 1.6;
        }
        .footer {
            text-align: center;
            font-size: 12px;
            color: #94a3b8;
            margin-top: 32px;
        }
        @media (min-width: 640px) {
            .cards-wrapper {
                flex-direction: row;
            }
            .card {
                flex: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">C-SSRS</div>
            <div class="subtitle">哥伦比亚自杀严重程度评定量表<br>电子评估系统</div>
        </div>

        <div class="cards-wrapper">
            <a href="/mobile" class="card doctor">
                <div class="card-header">
                    <div class="card-icon">‍⚕️</div>
                    <div class="card-title">医生入口</div>
                </div>
                <div class="card-desc">进行患者自杀风险评估与筛查，查看评估记录</div>
            </a>

            <a href="/admin" class="card admin">
                <div class="card-header">
                    <div class="card-icon">🔐</div>
                    <div class="card-title">管理员入口</div>
                </div>
                <div class="card-desc">管理系统配置、用户账户及数据导出功能</div>
            </a>
        </div>

        <div class="footer">
            <a href="/doctor-qr" style="color:#2563eb; text-decoration:none; font-weight:600;">📱 医生入口二维码</a>
            <span style="margin:0 6px; color:#cbd5e1;">·</span>
            基于 Columbia Lighthouse Project 开发
        </div>
    </div>
</body>
</html>
