<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>C-SSRS 医生入口码</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,"SF Pro SC","PingFang SC","Microsoft YaHei",sans-serif; background:#f8fafc; color:#1e293b; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px; }
.card { background:white; border-radius:20px; padding:32px 24px; box-shadow:0 4px 24px rgba(0,0,0,0.08); text-align:center; max-width:400px; width:100%; }
.logo { font-size:28px; font-weight:700; color:#2563eb; margin-bottom:4px; }
.subtitle { font-size:14px; color:#64748b; margin-bottom:24px; }
.qr-frame { background:white; padding:16px; border-radius:16px; display:inline-block; border:2px dashed #dbeafe; margin-bottom:20px; }
.qr-frame img { width:280px; height:280px; display:block; }
.url { font-size:14px; color:#2563eb; word-break:break-all; margin-bottom:16px; padding:8px 12px; background:#eff6ff; border-radius:8px; }
.hint { font-size:13px; color:#94a3b8; margin-bottom:20px; line-height:1.6; }
.btn { display:inline-block; padding:12px 24px; background:#2563eb; color:white; border:none; border-radius:10px; font-size:15px; font-weight:600; text-decoration:none; cursor:pointer; }
.btn:active { background:#1d4ed8; transform:scale(0.98); }
</style>
</head>
<body>
<div class="card">
  <div class="logo">C-SSRS</div>
  <div class="subtitle">医生入口二维码</div>
  <div class="qr-frame">
    <img src="/static/doctor-entry-qr.png" alt="医生入口二维码">
  </div>
  <div class="url" id="qr-url"></div>
  <div class="hint">医生用任意手机扫码即可进入<br>支持选择医生入口或管理员入口</div>
  <a href="/" class="btn">← 返回首页</a>
</div>
<script>
// Show actual URL for reference
document.getElementById('qr-url').textContent = window.location.origin + '/';
</script>
</body>
</html>
