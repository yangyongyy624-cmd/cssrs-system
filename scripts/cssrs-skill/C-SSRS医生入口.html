<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>C-SSRS 电子评估系统 - 医生端</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.card { background: #fff; border-radius: 16px; padding: 48px 40px; text-align: center; max-width: 420px; box-shadow: 0 20px 60px rgba(0,0,0,0.15); }
.logo { font-size: 48px; margin-bottom: 16px; }
h1 { font-size: 22px; color: #1a1a1a; margin-bottom: 8px; }
p { color: #666; font-size: 14px; line-height: 1.6; margin-bottom: 24px; }
.spinner { width: 36px; height: 36px; border: 3px solid #e8e8e8; border-top-color: #667eea; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 20px; }
@keyframes spin { to { transform: rotate(360deg); } }
.btn { display: inline-block; background: #667eea; color: #fff; padding: 12px 36px; border-radius: 8px; text-decoration: none; font-size: 15px; transition: background 0.2s; }
.btn:hover { background: #5a6fd6; }
.tip { margin-top: 20px; padding: 12px; background: #f8f9fa; border-radius: 8px; font-size: 12px; color: #999; }
</style>
</head>
<body>
<div class="card">
<div class="logo">&#128203;</div>
<h1>C-SSRS 电子评估系统</h1>
<p>正在跳转到医生端入口…</p>
<div class="spinner"></div>
<a class="btn" id="enter-btn" href="/">立即进入</a>
<div class="tip">如未自动跳转，请点击上方按钮</div>
</div>
<script>
// Dynamically redirect to avoid hardcoded server address
var target = window.location.origin + '/';
document.getElementById('enter-btn').href = target;
window.location.href = target;
</script>
</body>
</html>
